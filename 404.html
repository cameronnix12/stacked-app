<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Stacked</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080F0C; --text: #E2EDE6; --muted: #7A9E87; --primary: #22C55E; --primary-lt: #4ADE80; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
    .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #4ADE80, #2DD4BF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; margin-bottom: 48px; display: block; }
    .code { font-size: 96px; font-weight: 800; letter-spacing: -4px; background: linear-gradient(135deg, #4ADE80, #2DD4BF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 15px; color: var(--muted); margin-bottom: 36px; max-width: 360px; line-height: 1.7; }
    .btn { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, #22C55E, #2DD4BF); color: #000; border: none; cursor: pointer; font-family: inherit; font-size: 15px; font-weight: 700; padding: 14px 28px; border-radius: 99px; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 0 30px rgba(34,197,94,0.3); }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 0 50px rgba(34,197,94,0.45); }
    .btn-secondary { display: inline-flex; align-items: center; font-size: 14px; color: var(--muted); text-decoration: none; margin-top: 16px; transition: color 0.2s; }
    .btn-secondary:hover { color: var(--text); }
  </style>
</head>
<body>
  <a href="/" class="logo">Stacked</a>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>This page doesn't exist or was moved. Head back to start tracking your internship search.</p>
  <a href="/" class="btn">Back to Home</a>
  <a href="/app" class="btn-secondary" style="margin-top:16px">Go to my dashboard →</a>
</body>
</html>
